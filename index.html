<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buggy Demo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Buggy Demo App</h1>
    <p>A tiny app with a few deliberate bugs.</p>
  </header>

  <main>
    <!-- Counter -->
    <section class="card">
      <h2>Counter</h2>
      <p>Count: <span id="count">0</span></p>
      <button id="increment">+1</button>
      <button id="decrement">-1</button>
      <button id="reset">Reset</button>
    </section>

    <!-- Tip Calculator -->
    <section class="card">
      <h2>Tip Calculator</h2>
      <label>Bill: <input id="bill" type="number" value="50" /></label>
      <label>Tip %: <input id="tip" type="number" value="20" /></label>
      <button id="calc-tip">Calculate</button>
      <p>Total: <span id="total">—</span></p>
    </section>

    <!-- Todo List -->
    <section class="card">
      <h2>Todo List</h2>
      <input id="todo-input" type="text" placeholder="New task..." />
      <button id="add-todo">Add</button>
      <ul id="todo-list"></ul>
      <p>Remaining: <span id="remaining">0</span></p>
    </section>

    <!-- Greeting -->
    <section class="card">
      <h2>Greeting</h2>
      <input id="name-input" type="text" placeholder="Your name" />
      <button id="greet">Greet</button>
      <p id="greeting"></p>
    </section>

    <!-- Accounts -->
    <section class="card">
      <h2>Accounts</h2>
      <input id="su-user" type="text" placeholder="username" />
      <input id="su-pass" type="text" placeholder="password" />
      <input id="su-email" type="text" placeholder="email" />
      <button onclick="doSignup()">Sign up</button>
      <hr />
      <input id="li-user" type="text" placeholder="username" />
      <input id="li-pass" type="text" placeholder="password" />
      <button onclick="doLogin()">Log in</button>
      <p id="account-status"></p>
      <div id="profile"></div>
      <p>Quota left: <span id="quota">1000</span></p>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="accounts.js"></script>
</body>
</html>
