<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter Bug Fix Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .test-section {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px 0;
      border-radius: 5px;
    }
    .test-case {
      margin: 10px 0;
      padding: 10px;
      background-color: #f5f5f5;
      border-left: 4px solid #999;
    }
    .pass {
      border-left-color: #4caf50;
      background-color: #f1f8f4;
    }
    .fail {
      border-left-color: #f44336;
      background-color: #fef1f0;
    }
    button {
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 3px;
    }
    button:hover {
      background-color: #1976d2;
    }
  </style>
</head>
<body>
  <h1>Counter Bug Fix - Integration Test</h1>
  
  <div class="test-section">
    <h2>Manual Test</h2>
    <p>Count: <strong id="count">0</strong></p>
    <button id="increment">+1</button>
    <button id="decrement">-1</button>
    <button id="reset">Reset</button>
  </div>

  <div class="test-section">
    <h2>Test Results</h2>
    <div id="results"></div>
  </div>

  <script>
    // Test implementation
    let count = 0;
    const countEl = document.getElementById("count");
    const resultsEl = document.getElementById("results");
    let testsPassed = 0;
    let testsFailed = 0;

    // Set up button handlers (from app.js - fixed version)
    document.getElementById("increment").addEventListener("click", () => {
      count += 1;
      countEl.textContent = count;
    });

    document.getElementById("decrement").addEventListener("click", () => {
      // FIXED: changed from count += 1 to count -= 1
      count -= 1;
      countEl.textContent = count;
    });

    document.getElementById("reset").addEventListener("click", () => {
      count = 0;
      countEl.textContent = count;
    });

    // Test functions
    function test(name, condition) {
      const resultDiv = document.createElement("div");
      resultDiv.className = "test-case " + (condition ? "pass" : "fail");
      resultDiv.textContent = (condition ? "✓ PASS: " : "✗ FAIL: ") + name;
      resultsEl.appendChild(resultDiv);
      
      if (condition) {
        testsPassed++;
      } else {
        testsFailed++;
      }
    }

    // Reset for tests
    count = 0;
    countEl.textContent = "0";

    // Test 1: Initial value
    test("Initial count is 0", count === 0);

    // Test 2: Increment works
    count = 0;
    count += 1;
    test("Increment: count += 1 results in 1", count === 1);

    // Test 3: Decrement works (THE BUG FIX)
    count = 5;
    count -= 1;  // This is what the code SHOULD do
    test("Decrement: count -= 1 results in 4 (not 6)", count === 4);

    // Test 4: Multiple increments
    count = 0;
    count += 1;
    count += 1;
    count += 1;
    test("Multiple increments: 0 + 1 + 1 + 1 = 3", count === 3);

    // Test 5: Multiple decrements
    count = 10;
    count -= 1;
    count -= 1;
    test("Multiple decrements: 10 - 1 - 1 = 8", count === 8);

    // Test 6: Mixed operations
    count = 0;
    count += 1;  // 1
    count += 1;  // 2
    count -= 1;  // 1
    count += 1;  // 2
    count -= 1;  // 1
    test("Mixed operations: 0 + 1 + 1 - 1 + 1 - 1 = 1", count === 1);

    // Test 7: Reset
    count = 42;
    count = 0;
    test("Reset sets count to 0", count === 0);

    // Summary
    const summary = document.createElement("div");
    summary.style.marginTop = "20px";
    summary.style.fontSize = "16px";
    summary.style.fontWeight = "bold";
    summary.textContent = `Tests Passed: ${testsPassed}, Tests Failed: ${testsFailed}`;
    summary.style.color = testsFailed === 0 ? "green" : "red";
    resultsEl.appendChild(summary);
  </script>
</body>
</html>
